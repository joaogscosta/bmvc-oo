<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Média</title>
    <style>
        /* CSS: Estilização simples e centralizada */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 85%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        /* Cores dinâmicas para o resultado */
        .aprovado { color: #28a745; }
        .reprovado { color: #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Verificar Situação</h2>
        <!-- Inputs para coletar as notas -->
        <input type="number" id="nota1" placeholder="Nota 1" min="0" max="10" step="0.1">
        <input type="number" id="nota2" placeholder="Nota 2" min="0" max="10" step="0.1">
        
        <button onclick="calcularMedia()">Calcular Média</button>
        
        <!-- Local onde o resultado será exibido -->
        <div id="resultado"></div>
    </div>

    <script>
        // JavaScript: Lógica de cálculo e validação
        function calcularMedia() {
            // Captura os valores dos inputs e converte para número flutuante (float)
            const n1 = parseFloat(document.getElementById('nota1').value);
            const n2 = parseFloat(document.getElementById('nota2').value);
            const divResultado = document.getElementById('resultado');

            // Validação simples para garantir que o usuário preencheu os campos
            if (isNaN(n1) || isNaN(n2)) {
                divResultado.innerHTML = "Por favor, insira as duas notas.";
                divResultado.className = ""; // Remove classes de cor
                return;
            }

            // Calcula a média aritmética simples
            const media = (n1 + n2) / 2;
            
            // Define a lógica de aprovação (Média 7.0)
            if (media >= 7.0) {
                divResultado.innerHTML = `Aprovado! 🎉 <br> Média: ${media.toFixed(1)}`;
                divResultado.className = "aprovado"; // Aplica a cor verde do CSS
            } else {
                divResultado.innerHTML = `Reprovado. ❌ <br> Média: ${media.toFixed(1)}`;
                divResultado.className = "reprovado"; // Aplica a cor vermelha do CSS
            }
        }
    </script>

</body>
</html>
